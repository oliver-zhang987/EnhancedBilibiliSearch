<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>B站主题综合报告</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --ink: #1f2328;
    --muted: #656d76;
    --line: #e2e5e9;
    --pink: #fb7299;
    --pink-d: #e35a82;
    --ok: #1a7f37;
    --err: #cf222e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 28px 18px 64px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 22px; font-size: 13px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 18px;
  }
  label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 5px; }
  input[type=text], select {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink);
  }
  input[type=text]:focus, select:focus { outline: none; border-color: var(--pink); }
  .row { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 14px; }
  .row > div { flex: 1 1 160px; }
  .checks { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 14px; }
  .checks label {
    display: flex; align-items: center; gap: 6px; color: var(--ink);
    font-size: 14px; margin: 0; cursor: pointer; user-select: none;
  }
  button {
    margin-top: 16px; width: 100%; padding: 12px; font-size: 16px; font-weight: 600;
    color: #fff; background: var(--pink); border: none; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: var(--pink-d); }
  button:disabled { background: #c9ccd1; cursor: not-allowed; }
  .progress { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px; color: var(--ink); white-space: pre-wrap; }
  .progress .line { padding: 2px 0; border-bottom: 1px dashed var(--line); }
  .progress .line:last-child { border-bottom: none; }
  .status { font-size: 13px; display: inline-flex; align-items: center; gap: 7px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); display: inline-block; }
  .dot.running { background: var(--pink); animation: pulse 1.1s infinite; }
  .dot.done { background: var(--ok); }
  .dot.error { background: var(--err); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .apikey { margin-top: 12px; }
  .apikey input { font-size: 13px; padding: 7px 10px; }
  .hidden { display: none; }
  /* rendered report */
  #report { line-height: 1.7; }
  #report h1 { font-size: 24px; margin: 0 0 12px; border-bottom: 2px solid var(--line); padding-bottom: 8px; }
  #report h2 { font-size: 19px; margin: 26px 0 10px; }
  #report h3 { font-size: 16px; margin: 18px 0 6px; }
  #report a { color: var(--pink-d); text-decoration: none; }
  #report a:hover { text-decoration: underline; }
  #report code { background: #f0f1f3; padding: 1px 5px; border-radius: 4px; font-size: 90%; }
  #report table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
  #report th, #report td { border: 1px solid var(--line); padding: 6px 9px; text-align: left; }
  #report th { background: #f0f1f3; }
  #report pre { background: #f0f1f3; padding: 12px; border-radius: 8px; overflow: auto; }
  #report hr { border: none; border-top: 1px solid var(--line); margin: 22px 0; }
  .footer { color: var(--muted); font-size: 12px; text-align: center; margin-top: 30px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>B站主题综合报告</h1>
  <p class="sub">输入一个主题，自动检索 → 筛选 → 逐条摘要 → 综合成一份可追溯的研究报告。</p>

  <div class="card">
    <label for="topic">主题</label>
    <input id="topic" type="text" placeholder="例如：大语言模型 RAG 检索增强" autofocus />

    <div class="row">
      <div>
        <label for="maxVideos">摘要视频数</label>
        <select id="maxVideos">
          <option value="">默认（6）</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="6">6</option>
          <option value="8">8</option>
          <option value="10">10</option>
        </select>
      </div>
      <div>
        <label for="duration">时长筛选</label>
        <select id="duration">
          <option value="">默认（10–30 分钟）</option>
          <option value="0">全部</option>
          <option value="1">10 分钟以内</option>
          <option value="2">10–30 分钟</option>
          <option value="3">30–60 分钟</option>
          <option value="4">60 分钟以上</option>
        </select>
      </div>
    </div>

    <div class="checks">
      <label><input id="allowAsr" type="checkbox" />允许语音转写 (ASR)</label>
      <label><input id="queryExpand" type="checkbox" />LLM 查询扩展</label>
      <label><input id="querySuggest" type="checkbox" />B站搜索建议</label>
      <label><input id="rerank" type="checkbox" />LLM 候选重排</label>
    </div>

    <div class="apikey hidden" id="apikeyBox">
      <label for="apikey">API Key（本页面要求鉴权）</label>
      <input id="apikey" type="text" placeholder="X-API-Key" />
    </div>

    <button id="go">生成报告</button>
  </div>

  <div class="card hidden" id="statusCard">
    <div class="status">
      <span class="dot" id="dot"></span><span id="statusText">准备中…</span>
    </div>
    <div class="progress" id="progress" style="margin-top:10px;"></div>
  </div>

  <div class="card hidden" id="reportCard">
    <div id="report"></div>
  </div>

  <p class="footer">逐视频摘要复用 AIVideoSummary 后端 · 综合由较强 LLM 完成</p>
</div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var POLL_MS = 3000;
  var MARKED_CDN = "https://cdn.jsdelivr.net/npm/marked/marked.min.js";

  // ---- API key handling (only surfaces if the server demands it) ----
  var storedKey = localStorage.getItem("ebs_api_key") || "";
  if (storedKey) $("apikey").value = storedKey;

  function headers() {
    var h = { "Content-Type": "application/json" };
    var k = $("apikey").value.trim();
    if (k) h["X-API-Key"] = k;
    return h;
  }

  // ---- markdown rendering with graceful fallback ----
  var markedReady = false;
  (function loadMarked() {
    var s = document.createElement("script");
    s.src = MARKED_CDN;
    s.onload = function () { markedReady = true; };
    s.onerror = function () { markedReady = false; };
    document.head.appendChild(s);
  })();

  function renderMarkdown(md) {
    var el = $("report");
    if (markedReady && window.marked) {
      var fn = window.marked.parse || window.marked;
      el.innerHTML = fn(md);
    } else {
      var pre = document.createElement("pre");
      pre.textContent = md;
      el.innerHTML = "";
      el.appendChild(pre);
    }
  }

  function setStatus(status) {
    var dot = $("dot"), txt = $("statusText");
    dot.className = "dot " + status;
    var map = {
      pending: "排队中…", running: "生成中（约需 1–2 分钟）…",
      done: "已完成", error: "出错"
    };
    txt.textContent = map[status] || status;
  }

  function renderProgress(lines) {
    var box = $("progress");
    box.innerHTML = "";
    (lines || []).forEach(function (line) {
      var d = document.createElement("div");
      d.className = "line";
      d.textContent = "· " + line;
      box.appendChild(d);
    });
    box.scrollTop = box.scrollHeight;
  }

  var polling = null;

  function poll(jobId) {
    fetch("/api/research/" + jobId, { headers: headers() })
      .then(function (r) {
        if (r.status === 401) { throw new Error("鉴权失败：请检查 API Key"); }
        if (!r.ok) { throw new Error("查询失败 (HTTP " + r.status + ")"); }
        return r.json();
      })
      .then(function (data) {
        setStatus(data.status);
        renderProgress(data.progress);
        if (data.status === "done") {
          stop();
          $("reportCard").classList.remove("hidden");
          renderMarkdown(data.markdown || "（无内容）");
          $("statusText").textContent =
            "已完成：" + (data.n_candidates || 0) + " 候选 → " +
            (data.n_selected || 0) + " 入选 → " + (data.n_summarized || 0) + " 摘要";
          $("go").disabled = false;
        } else if (data.status === "error") {
          stop();
          $("statusText").textContent = "出错：" + (data.error || "未知错误");
          $("go").disabled = false;
        }
      })
      .catch(function (err) {
        stop();
        setStatus("error");
        $("statusText").textContent = err.message || String(err);
        $("go").disabled = false;
      });
  }

  function stop() { if (polling) { clearInterval(polling); polling = null; } }

  function start() {
    var topic = $("topic").value.trim();
    if (!topic) { $("topic").focus(); return; }

    var key = $("apikey").value.trim();
    if (key) localStorage.setItem("ebs_api_key", key);

    var body = { topic: topic };
    var mv = $("maxVideos").value, dur = $("duration").value;
    if (mv) body.max_videos = parseInt(mv, 10);
    if (dur !== "") body.duration_filter = parseInt(dur, 10);
    if ($("allowAsr").checked) body.allow_asr = true;
    if ($("queryExpand").checked) body.query_expand = true;
    if ($("querySuggest").checked) body.query_suggest = true;
    if ($("rerank").checked) body.allow_llm_rerank = true;

    $("go").disabled = true;
    $("reportCard").classList.add("hidden");
    $("report").innerHTML = "";
    $("statusCard").classList.remove("hidden");
    setStatus("pending");
    renderProgress(["提交任务…"]);

    fetch("/api/research", {
      method: "POST", headers: headers(), body: JSON.stringify(body)
    })
      .then(function (r) {
        if (r.status === 401) {
          $("apikeyBox").classList.remove("hidden");
          throw new Error("需要 API Key：请在上方填写后重试");
        }
        if (r.status !== 202 && !r.ok) { throw new Error("提交失败 (HTTP " + r.status + ")"); }
        return r.json();
      })
      .then(function (data) {
        if (!data.job_id) { throw new Error("未返回 job_id"); }
        stop();
        poll(data.job_id);
        polling = setInterval(function () { poll(data.job_id); }, POLL_MS);
      })
      .catch(function (err) {
        setStatus("error");
        $("statusText").textContent = err.message || String(err);
        $("go").disabled = false;
      });
  }

  $("go").addEventListener("click", start);
  $("topic").addEventListener("keydown", function (e) {
    if (e.key === "Enter") start();
  });
})();
</script>
</body>
</html>
